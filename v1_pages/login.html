<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./shared.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card glass-panel-strong">
      <div class="auth-header">
        <div class="auth-brand-mark"><span class="material-symbols-outlined" style="font-size: 34px;">science</span></div>
        <h1 class="page-title" style="font-size: 28px; margin: 0;">Ethereal Lab</h1>
        <p class="page-subtitle" style="margin: 0;">欢迎回来，请登录你的 AI 驱动型研发协作账户。</p>
      </div>
      <form class="auth-form" action="./dashboard.html" method="get">
        <div class="field-stack">
          <label class="field-label">用户名</label>
          <div class="field-input">
            <span class="material-symbols-outlined">person</span>
            <input type="text" placeholder="请输入研发工号" />
          </div>
        </div>
        <div class="field-stack">
          <label class="field-label">密码</label>
          <div class="field-input">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" placeholder="请输入安全密码" />
          </div>
        </div>
        <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; color: var(--color-text-secondary); font-size: 13px;">
          <label style="display:flex; gap:8px; align-items:center;"><input type="checkbox" />记住我</label>
          <a href="./register.html" style="color: var(--color-primary-700); font-weight: 600;">还没有账号？去注册</a>
        </div>
        <button class="btn-primary" type="submit" style="min-height: 54px; font-size: 18px;">立即登录 <span class="material-symbols-outlined">arrow_forward</span></button>
      </form>
      <div style="display:flex; align-items:center; gap:16px; color: var(--color-text-tertiary); font-size: 12px;">
        <div style="height:1px; flex:1; background: rgba(216,221,232,0.9);"></div>
        <span>第三方接入</span>
        <div style="height:1px; flex:1; background: rgba(216,221,232,0.9);"></div>
      </div>
      <div style="display:flex; justify-content:center; gap:16px;">
        <button class="icon-btn glass-soft" type="button"><span class="material-symbols-outlined">fingerprint</span></button>
        <button class="icon-btn glass-soft" type="button"><span class="material-symbols-outlined">qr_code_scanner</span></button>
      </div>
      <p class="section-caption" style="text-align:center; margin: 0;">© 2026 Ethereal Lab 研发管理系统</p>
    </section>
  </main>
</body>
</html>
